<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Mommo Travels</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="hero" style="background-image:url('assets/images/hero/contact-hero.jpg')">
  <div class="hero-content">
    <h1>Contact</h1>
    <p>Questions, collaborations, or just a hello — I’d love to hear from you.</p>
  </div>
</header>

<section>
  <h2>Send a Message</h2>
  <p>Share a thought, an idea, or a project you’d like to bring to life.</p>

  <form>
    <label>Name</label>
    <input type="text" placeholder="Your name">

    <label>Email</label>
    <input type="email" placeholder="you@example.com">

    <label>Message</label>
    <textarea placeholder="Tell me what’s on your mind..."></textarea>

    <button class="btn">Send Message</button>
  </form>

  <div class="email-box">
    <p>Prefer to email me directly?</p>
    <a href="mailto:your-email@example.com">your-email@example.com</a>
  </div>

  <div class="social">
    Or find me here:
    <a href="#">Instagram</a> · <a href="#">Facebook</a> · <a href="#">Email</a>
  </div>
</section>

</body>
</html>
